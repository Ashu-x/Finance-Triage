<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Support Triage System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            grid-template-rows: auto 1fr;
        }

        .header {
            grid-column: 1 / -1;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .panel h2 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        /* Input Panel */
        #input-panel {
            grid-column: 1;
            grid-row: 2;
        }

        #message-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 200px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        #message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        #submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #clear-btn {
            background: #f0f0f0;
            color: #666;
        }

        #clear-btn:hover {
            background: #e0e0e0;
        }

        .character-count {
            font-size: 12px;
            color: #999;
            text-align: right;
            margin-top: 5px;
        }

        /* Response Panel */
        #response-panel {
            grid-column: 2;
            grid-row: 2;
        }

        .result-section {
            margin-bottom: 20px;
        }

        .result-section h3 {
            color: #764ba2;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .classification-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .classification-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .classification-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .classification-value {
            font-size: 18px;
            color: #333;
            font-weight: 600;
        }

        .urgency-critical {
            border-left-color: #f44336;
            background: #ffebee;
        }

        .urgency-high {
            border-left-color: #ff9800;
            background: #fff3e0;
        }

        .urgency-medium {
            border-left-color: #ffc107;
            background: #fffde7;
        }

        .urgency-low {
            border-left-color: #4caf50;
            background: #f1f8e9;
        }

        .entities-list {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .entity-item {
            background: white;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 6px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            color: #333;
            border-left: 3px solid #667eea;
        }

        .response-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
            line-height: 1.6;
            color: #333;
        }

        .processing-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e8f5e9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #2e7d32;
        }

        /* Removed console logs panel - now saves to text file instead */

        /* Empty state */
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-style: italic;
        }

        /* Spinner */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Loading state */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            #input-panel, #response-panel {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Finance Support Triage System</h1>
            <p>Automated classification and response generation for customer support messages</p>
        </div>

        <!-- Input Panel -->
        <div class="panel" id="input-panel">
            <h2>Customer Complaint</h2>
            <textarea 
                id="message-input" 
            ></textarea>
            <div class="character-count">
                <span id="char-count">0</span> characters
            </div>
            <div class="button-group">
                <button id="submit-btn">Process Message</button>
                <button id="clear-btn">Clear</button>
            </div>
        </div>

        <!-- Response Panel -->
        <div class="panel" id="response-panel">
            <h2>Triage Analysis</h2>
            <div id="response-content">
                <div class="empty-state">
                    Enter a message and click "Process Message" to see the analysis
                </div>
            </div>
        </div>
    </div>

    <script>
        const messageInput = document.getElementById('message-input');
        const submitBtn = document.getElementById('submit-btn');
        const clearBtn = document.getElementById('clear-btn');
        const charCount = document.getElementById('char-count');
        const responseContent = document.getElementById('response-content');

        // Update character count
        messageInput.addEventListener('input', (e) => {
            charCount.textContent = e.target.value.length;
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            messageInput.value = '';
            charCount.textContent = '0';
            responseContent.innerHTML = '<div class="empty-state">Enter a message and click "Process Message" to see the analysis</div>';
        });

        // Format urgency with color
        function getUrgencyClass(urgency) {
            return `urgency-${urgency.toLowerCase()}`;
        }

        // Format response HTML
        function formatResponse(data) {
            const { classification, entities, response, processing_time_ms, log_file } = data;

            return `
                <div class="result-section">
                    <h3>Classification</h3>
                    <div class="classification-grid">
                        <div class="classification-item ${getUrgencyClass(classification.urgency)}">
                            <div class="classification-label">Urgency Level</div>
                            <div class="classification-value">${classification.urgency}</div>
                        </div>
                        <div class="classification-item">
                            <div class="classification-label">Intent</div>
                            <div class="classification-value">${classification.intent.replace(/_/g, ' ').toUpperCase()}</div>
                        </div>
                        <div class="classification-item">
                            <div class="classification-label">Confidence Score</div>
                            <div class="classification-value">${(classification.confidence * 100).toFixed(0)}%</div>
                        </div>
                    </div>
                </div>

                ${entities.transaction_ids.length > 0 || entities.amounts.length > 0 || entities.dates.length > 0 ? `
                <div class="result-section">
                    <h3>Extracted Information</h3>
                    <div class="entities-list">
                        ${entities.transaction_ids.length > 0 ? `
                            <div style="margin-bottom: 10px;">
                                <strong style="color: #667eea;">Transaction IDs:</strong>
                                ${entities.transaction_ids.map(t => `<div class="entity-item">${t}</div>`).join('')}
                            </div>
                        ` : ''}
                        ${entities.amounts.length > 0 ? `
                            <div style="margin-bottom: 10px;">
                                <strong style="color: #667eea;">Amounts:</strong>
                                ${entities.amounts.map(a => `<div class="entity-item">${a}</div>`).join('')}
                            </div>
                        ` : ''}
                        ${entities.dates.length > 0 ? `
                            <div style="margin-bottom: 10px;">
                                <strong style="color: #667eea;">Dates:</strong>
                                ${entities.dates.map(d => `<div class="entity-item">${d}</div>`).join('')}
                            </div>
                        ` : ''}
                        ${entities.account_numbers.length > 0 ? `
                            <div style="margin-bottom: 10px;">
                                <strong style="color: #667eea;">Account Numbers:</strong>
                                ${entities.account_numbers.map(a => `<div class="entity-item">${a}</div>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
                ` : ''}

                <div class="result-section">
                    <h3>AI-Generated Response</h3>
                    <div class="response-box">${response}</div>
                </div>

                <div class="result-section">
                    <div class="processing-info">
                        <span>Processed in <strong>${processing_time_ms.toFixed(0)}ms</strong></span>
                    </div>
                    <div style="background: #e8f5e9; padding: 15px; border-radius: 8px; color: #2e7d32; margin-top: 15px; border-left: 4px solid #2e7d32; font-weight: 500;">
                        Complete analysis saved to database for review.
                    </div>
                </div>
            `;
        }

        // Submit button
        submitBtn.addEventListener('click', async () => {
            const message = messageInput.value.trim();

            if (!message) {
                responseContent.innerHTML = `
                    <div style="background: #ffebee; padding: 15px; border-radius: 8px; color: #c62828; border-left: 4px solid #c62828;">
                        Please enter a message before processing.
                    </div>
                `;
                return;
            }

            submitBtn.disabled = true;

            responseContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Processing your message...</span>
                </div>
            `;

            try {
                const response = await fetch('/api/triage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Request failed');
                }

                const data = await response.json();
                responseContent.innerHTML = formatResponse(data);

            } catch (error) {
                responseContent.innerHTML = `
                    <div style="background: #ffebee; padding: 15px; border-radius: 8px; color: #c62828; border-left: 4px solid #c62828;">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
            }
        });

        // Allow Enter+Ctrl/Cmd to submit
        messageInput.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                submitBtn.click();
            }
        });
    </script>
</body>
</html>
